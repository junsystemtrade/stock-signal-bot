name: Daily Stock Check

on:
  schedule:
    # 毎日 日本時間18:00 (UTC 9:00) に実行
    - cron: '0 9 * * *'
  workflow_dispatch: # 手動実行ボタンを有効化

jobs:
  build:
    name: Daily Stock Check
    runs-on: ubuntu-latest
    permissions:
      # CSVの更新をリポジトリに書き込むために必要な権限
      contents: write

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Python環境のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 依存ライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 株価チェックスクリプトの実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: 変更内容のコミットとプッシュ
        run: |
          # Gitユーザーの設定
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # フォルダ内のすべてのCSVファイルをステージングに追加
          git add *.csv
          
          # 変更がある場合のみコミットし、変更がない場合はメッセージを出して終了
          # コミットメッセージに [skip ci] を含めて無限ループを防止
          git commit -m "取引履歴と株価データの更新 [skip ci]" || echo "コミットする変更はありません"
          
          # 変更をリポジトリへ反映
          git push
