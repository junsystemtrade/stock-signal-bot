name: backtest

on:
  schedule:
    # 平日 火曜〜土曜の日本時間 AM 7:30 (UTC 22:30) に実行
    # 米国市場閉場後の確定データを取得するため
    - cron: '30 22 * * 1-5'
  workflow_dispatch: # 手動実行用ボタン

jobs:
  trade_job:
    name: トレード実行ジョブ
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v3

      - name: Python環境のセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 依存ライブラリのインストール
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance discord-py pytz holidays

      - name: メインスクリプトの実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: トレード履歴とデータの更新を保存
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add trade_history.csv *_history.csv
          git commit -m "トレード履歴の自動更新 [skip ci]" || echo "変更なし"
          git push
